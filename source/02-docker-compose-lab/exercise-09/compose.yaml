services:
  app:
    image: nginx:alpine
    ports:
      - "8080:80"

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass

  adminer:
    image: adminer
    ports:
      - "9090:8080"
    profiles:
      - debug

  redis-commander:
    image: rediscommander/redis-commander
    environment:
      REDIS_HOSTS: "cache"
    ports:
      - "8081:8081"
    profiles:
      - debug

  test-runner:
    image: alpine
    command: echo "Tests passed"
    profiles:
      - test
