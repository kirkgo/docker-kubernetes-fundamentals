<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Full Stack Lab</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 40px auto;
        padding: 0 20px;
        background: #f5f5f5;
        color: #333;
      }
      h1 {
        color: #2c3e50;
      }
      pre {
        background: #2c3e50;
        color: #ecf0f1;
        padding: 20px;
        border-radius: 8px;
        overflow-x: auto;
      }
      button {
        background: #3498db;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }
      button:hover {
        background: #2980b9;
      }
      .status {
        margin: 10px 0;
        font-weight: bold;
      }
      .healthy {
        color: #27ae60;
      }
      .unhealthy {
        color: #e74c3c;
      }
    </style>
  </head>
  <body>
    <h1>Full Stack Lab Dashboard</h1>
    <p>Docker Compose Multi-Service Application</p>
    <button onclick="fetchInfo()">Fetch API Info</button>
    <button onclick="checkHealth()">Health Check</button>
    <div id="status" class="status"></div>
    <pre id="output">Click a button to query the API.</pre>
    <script>
      async function fetchInfo() {
        try {
          const res = await fetch("/api/info");
          const data = await res.json();
          document.getElementById("output").textContent = JSON.stringify(
            data,
            null,
            2,
          );
        } catch (err) {
          document.getElementById("output").textContent =
            "Error: " + err.message;
        }
      }
      async function checkHealth() {
        try {
          const res = await fetch("/health");
          const data = await res.json();
          const el = document.getElementById("status");
          el.textContent = "Status: " + data.status;
          el.className = "status " + data.status;
        } catch (err) {
          const el = document.getElementById("status");
          el.textContent = "Status: unreachable";
          el.className = "status unhealthy";
        }
      }
    </script>
  </body>
</html>
